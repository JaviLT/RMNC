<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle de kilos — RMNC</title>
<style>
:root{--bg:#f0f4f8;--card:#fff;--text:#1a1a1a;--text-sub:#666;--border:#e0e8f0;--header:#1a4a8a;--kpibg:#f7faff;}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--text:#e8edf4;--text-sub:#a8b3c4;--border:#334155;--header:#15355e;--kpibg:#16243d;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);}
.header{background:var(--header);color:white;padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header h1{font-size:18px;font-weight:500}
.header-right{margin-left:auto;display:flex;gap:10px}
.back-btn,.theme-toggle{background:rgba(255,255,255,.15);border:none;color:white;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}
.content{padding:20px 24px}
.card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:16px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;color:var(--header);margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:8px}
[data-theme="dark"] .card-title{color:#7fb0e8}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;color:var(--text-sub);text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text)}
tr:hover td{background:var(--kpibg)}
.total-row{font-weight:600;background:var(--kpibg)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-D{background:#fef3c7;color:#92400e}
.badge-A{background:#d1fae5;color:#065f46}
.badge-R{background:#fee2e2;color:#991b1b}
[data-theme="dark"] .badge-D{background:#78350f;color:#fde68a}
[data-theme="dark"] .badge-A{background:#064e3b;color:#a7f3d0}
[data-theme="dark"] .badge-R{background:#7f1d1d;color:#fecaca}
</style>
</head>
<body>
<div class="header">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
  <h1 id="page-title">Detalle de kilos</h1>
  <div class="header-right">
    <button class="back-btn" onclick="window.location.href='reporte.html'">← Volver</button>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">Modo oscuro</button>
  </div>
</div>
<div class="content" id="content"><p style="padding:40px;text-align:center">Cargando datos...</p></div>

<script>
const JSON_URL="https://raw.githubusercontent.com/JaviLT/RMNC/main/datos.json";
const TIPO_LABELS={"todos":"Kilos detenidos totales","Detenido":"Kilos detenidos actuales","Aceptado":"Kilos aceptados","Rechazado":"Kilos rechazados"};

function fmt(v){const n=parseFloat(v);return isNaN(n)?(v||"0"):n.toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});}
function badgeStatus(s){
  const cls={Detenido:"D",Aceptado:"A",Rechazado:"R"}[s]||"D";
  return '<span class="badge badge-'+cls+'">'+s+'</span>';
}

function getTipo(){return new URLSearchParams(window.location.search).get("tipo")||"todos";}

function render(D){
  const tipo=getTipo();
  const filtros=JSON.parse(sessionStorage.getItem("rmnc-filtros")||"{}");
  document.getElementById("page-title").textContent=TIPO_LABELS[tipo]||"Detalle";

  let rows=[...D.kilosDetalle];
  if(tipo!=="todos") rows=rows.filter(r=>r.Status===tipo);

  // Aplicar filtros guardados
  if(filtros.anio) rows=rows.filter(r=>{
    const d=new Date(r.Fecha.split("/").reverse().join("-")); return d.getFullYear()===parseInt(filtros.anio);
  });
  if(filtros.mes) rows=rows.filter(r=>{
    const d=new Date(r.Fecha.split("/").reverse().join("-")); return (d.getMonth()+1)===parseInt(filtros.mes);
  });
  if(filtros.cliente) rows=rows.filter(r=>r.Cliente===filtros.cliente);
  if(filtros.familia) rows=rows.filter(r=>r.Familia===filtros.familia);
  if(filtros.dep)     rows=rows.filter(r=>r.DepResponsable===filtros.dep);
  if(filtros.dev)     rows=rows.filter(r=>r.Desviacion===filtros.dev);

  let totDet=0,totAce=0,totSc=0;
  rows.forEach(r=>{totDet+=parseFloat(r.CantDetenido)||0;totAce+=parseFloat(r.Aceptado)||0;totSc+=parseFloat(r.Scrap)||0;});

  let html='<div class="card"><div class="card-title">'+TIPO_LABELS[tipo]+' — '+rows.length+' registros</div>';
  html+='<table><thead><tr><th>Fecha de elaboración</th><th>Folio</th><th>Código</th><th>Descripción</th><th>Dep. Responsable</th><th>Lote</th><th>Cant. Detenido</th><th>Aceptado</th><th>Scrap</th><th>Desviación</th><th>Dep. Detuvo</th><th>Estatus</th></tr></thead><tbody>';
  rows.forEach(r=>{
    html+='<tr><td>'+r.Fecha+'</td><td>'+r.Folio+'</td><td>'+r.Codigo+'</td><td>'+r.Descripcion+'</td><td>'+r.DepResponsable+'</td><td>'+r.Lote+'</td><td>'+fmt(r.CantDetenido)+'</td><td>'+fmt(r.Aceptado)+'</td><td>'+fmt(r.Scrap)+'</td><td>'+r.Desviacion+'</td><td>'+r.DepDetuvo+'</td><td>'+badgeStatus(r.Status)+'</td></tr>';
  });
  html+='<tr class="total-row"><td colspan="6">TOTAL</td><td>'+fmt(totDet)+'</td><td>'+fmt(totAce)+'</td><td>'+fmt(totSc)+'</td><td colspan="3"></td></tr>';
  html+='</tbody></table></div>';
  document.getElementById("content").innerHTML=html;
}

function toggleTheme(){
  const isDark=document.documentElement.getAttribute("data-theme")==="dark";
  document.documentElement.setAttribute("data-theme",isDark?"light":"dark");
  localStorage.setItem("rmnc-theme",isDark?"light":"dark");
  document.getElementById("theme-btn").textContent=isDark?"Modo oscuro":"Modo claro";
}

(function(){if(localStorage.getItem("rmnc-theme")==="dark")document.documentElement.setAttribute("data-theme","dark");})();

window.onload=async function(){
  if(localStorage.getItem("rmnc-theme")==="dark") document.getElementById("theme-btn").textContent="Modo claro";
  try{
    const r=await fetch(JSON_URL+"?t="+Date.now());
    const D=await r.json();
    render(D);
  } catch(e){
    document.getElementById("content").innerHTML='<p style="padding:40px;color:red;">Error al cargar datos.</p>';
  }
};
</script>
</body></html>
